<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifolio de Desenhos</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <!-- Form to add a new drawing -->
    <h1>DrawVault</h1>
    <p>meus Desenhos</p>
    <div class="container">
        <h1 class="heading">Pesquisar Desenho</h1>
        <input type="text" placeholder="Buscar pelo nome..." id="search-box">
    </div>
    
    <div id="menu">
        <input type="text" id="name" placeholder="Name of the Drawing">
        <input type="text" id="description" placeholder="Descriptions...">
        <label for="date">Date:</label>
        <input type="date" id="date">
        <label for="file">image:</label>
        <input type="file" id="imagens" name="imagens" accept="image/png,image/jpeg"/>

         <button id="button">Adicionar</button>
    </div>

    <div id="galeria">
        <div class="grid"></div>
    </div>
    
    <div id="myModal" class="modal">
        <span class="close cursor" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            
        </div>
    </div>




    <script src="script.js"></script>
</body>
</html>
